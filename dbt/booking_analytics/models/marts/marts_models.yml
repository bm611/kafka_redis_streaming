version: 2

models:
  - name: fct_ad_performance
    description: Daily ad performance metrics by partner, hotel, and placement
    columns:
      - name: performance_key
        tests:
          - not_null
          - unique
      - name: ctr
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: revenue
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: roas
        tests:
          - dbt_utils.accepted_range:
              min_value: 0

  - name: dim_hotels
    description: Hotel dimension with aggregated booking stats
    columns:
      - name: hotel_id
        tests:
          - not_null
          - unique
      - name: hotel_name
        tests:
          - not_null

  - name: dim_partners
    description: Ad partner dimension with aggregated impression stats
    columns:
      - name: partner_id
        tests:
          - not_null
          - unique
