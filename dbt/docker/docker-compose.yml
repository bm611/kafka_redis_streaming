name: booking-dbt
services:
  # --- Data Warehouse ---
  warehouse:
    image: postgres:16-alpine
    container_name: booking_warehouse
    restart: unless-stopped
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
      POSTGRES_DB: booking_analytics
    ports:
      - '5433:5432'
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      - ../scripts/init_raw_tables.sql:/docker-entrypoint-initdb.d/init_raw_tables.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U booking_user -d booking_analytics']
      interval: 5s
      retries: 5

  # --- Airflow (standalone: api-server + scheduler + dag-processor) ---
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: booking_airflow
    restart: unless-stopped
    depends_on:
      warehouse:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    ports:
      - '8080:8080'
    volumes:
      - ../dags:/opt/airflow/dags
      - ../booking_analytics:/opt/airflow/dbt/booking_analytics
    command: airflow standalone

volumes:
  warehouse_data:
